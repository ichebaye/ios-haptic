<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iOS Haptic Trick</title>
<style>
  body {
    font-family: -apple-system, system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: #f2f2f7;
  }
  .haptic-button {
    position: relative;
    display: inline-block;
    border-radius: 12px;
    overflow: hidden;
  }
  .haptic-button button {
    font-size: 18px;
    padding: 14px 28px;
    border-radius: 12px;
    border: none;
    background: #007aff;
    color: #fff;
    pointer-events: none;
  }
  /* реальный switch лежит поверх кнопки на весь её размер; палец тапает
     именно по нему, поэтому iOS считает это прямым взаимодействием
     пользователя и выдаёт хаптик */
  .haptic-button input[type="checkbox"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    opacity: 0;
  }
  p {
    max-width: 320px;
    text-align: center;
    color: #555;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="haptic-button">
    <button tabindex="-1">Тапни меня</button>
    <label for="haptic-switch">
      <input type="checkbox" switch id="haptic-switch">
    </label>
  </div>
  <p>
    Работает только в Safari на iOS 18+. Хаптик срабатывает только от
    прямого тапа по нативному <code>&lt;input switch&gt;</code> —
    начиная с iOS 26.5 вызов через скрипт (<code>label.click()</code>)
    больше не даёт вибро.
  </p>
</body>
</html>
